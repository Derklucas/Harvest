name: Deploy Quartz site to GitHub Pages
 
on:
  push:
    branches:
      - v4  # Trigger deployment on push to the 'v4' branch
 
permissions:
  contents: read
  pages: write
  id-token: write
 
concurrency:
  group: "pages"
  cancel-in-progress: false
 
jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetch all history for git info
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install Dependencies
        run: npm ci
      - name: Build Quartz
        run: npx quartz build  # Ensure this builds into 'docs' folder (check your Quartz config)
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs  # <-- Change 'public' to 'docs' here to match the output folder
 
  deploy:
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
